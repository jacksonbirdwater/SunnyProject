<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTG co</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BOOT SCREEN -->
<div id="boot-screen">
  <div class="boot-content">
    <h1 class="logo">YTG</h1>
    <p class="subtitle">BOOTING UP THE THROAT</p>

    <div class="loader">
      <div class="block"></div>
    </div>
  </div>
</div>

<!-- DESKTOP -->
<main id="desktop">

  <!-- WINDOWS -->
  <div class="window" style="top: 60px; left: 80px;">
    <div class="title-bar">
      <span>Welcome</span>
      <div class="buttons"><span></span><span></span><span></span></div>
    </div>
    <div class="content">
      <h3>YTG Enterprise</h3>
      <p>Desktop system loaded.</p>
    </div>
  </div>

  <div class="window" style="top: 220px; left: 320px;">
    <div class="title-bar">
      <span>Status</span>
      <div class="buttons"><span></span><span></span><span></span></div>
    </div>
    <div class="content">
      <p>All systems operational.</p>
    </div>
  </div>

  <div class="window" style="top: 120px; left: 520px;">
    <div class="title-bar">
      <span>Alert</span>
      <div class="buttons"><span></span><span></span><span></span></div>
    </div>
    <div class="content">
      <p>System ready.</p>
    </div>
  </div>

  <!-- DESKTOP ICON -->
  <div class="desktop-icon" onclick="openPlayer()">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
    <span>Media Player</span>
  </div>

  <!-- MEDIA PLAYER -->
  <div id="media-player" class="window hidden" style="top: 150px; left: 200px;">
    <div class="title-bar">
      <span>Windows Media Player</span>
      <div class="buttons">
        <span onclick="closePlayer()">X</span>
      </div>
    </div>

    <div class="content">
      <h3>Playlist</h3>
      <ul>
        <li onclick="playSong('song1.mp3')">Song 1</li>
        <li onclick="playSong('song2.mp3')">Song 2</li>
        <li onclick="playSong('song3.mp3')">Song 3</li>
      </ul>

      <audio id="audio" controls></audio>
    </div>
  </div>
  <div class="window" style="top: 100px; left: 100px;">
  <div class="title-bar">DRAG ME</div>
  <div class="content">test</div>
</div>

</main>

<script src="script.js"></script>
</body>
</html>
